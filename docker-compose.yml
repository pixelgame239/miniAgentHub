services:
  # 1. Dịch vụ Database (PostgreSQL)
  database:
    image: postgres:12-alpine
    container_name: my_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: miniagenthub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

  # ⭐ THÊM VÀO: 2. Dịch vụ Redis
  redis-cache:
    image: redis:alpine
    container_name: miniagenthub_redis
    restart: always
    ports:
      - "6379:6379" # Cho phép máy thật kết nối (nếu cần dùng tool UI kiểm tra)
    networks:
      - my_network

  # 3. Dịch vụ Backend
  backend-app:
    build: ./backend
    container_name: my_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - database
      - redis-cache # ⭐ Thêm dependencies để Redis lên trước Backend
    networks:
      - my_network

  # 4. Dịch vụ Frontend
  frontend-app:
    build: ./frontend
    container_name: my_frontend
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    networks:
      - my_network

volumes:
  postgres_data:

networks:
  my_network:
    driver: bridge